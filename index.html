<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>弾着タイマー</title>
  <link rel="manifest" href="./manifest.json?v=2">
  <style>
    /* 🎨 カラー定義（一括管理） */
    :root {
      --bg-color: #f4f4f9;
      --text-color: #333;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.1);
      --squad-title-bg: #eee;
      --timer-bg: #e0e0e0;
      --timer-watermark: rgba(0,0,0,0.25);
      --timer-text-shadow: 0px 0px 4px rgba(255, 255, 255, 0.9), 0px 0px 4px rgba(255, 255, 255, 0.9);
      --input-bg: #f9f9f9;
      --input-border: #ccc;
      --btn-reset-container-bg: #fff;
      --btn-reset-border: #ccc;
      --timer-running-bg: #fff9c4;
      --timer-running-border: #fbc02d;
      --timer-running-text: #333;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --card-bg: #1e1e1e;
        --card-shadow: rgba(0,0,0,0.5);
        --squad-title-bg: #2c2c2c;
        --timer-bg: #333;
        --timer-watermark: rgba(255,255,255,0.3);
        --timer-text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        --input-bg: #2c2c2c;
        --input-border: #555;
        --btn-reset-container-bg: #121212;
        --btn-reset-border: #333;
        --timer-running-bg: #5c5311;
        --timer-running-border: #fbc02d;
        --timer-running-text: #fff;
      }
    }

    /* 📱 全体の設定 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      height: 100vh; width: 100vw;
      display: flex; flex-direction: column;
      touch-action: manipulation;
      overflow: hidden;
    }
    
    #setup-section {
      height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box;
    }
    h1 { font-size: 24px; text-align: center; margin-top: 0; }
    .card {
      background-color: var(--card-bg); padding: 20px; border-radius: 10px;
      box-shadow: 0 4px 6px var(--card-shadow); margin-bottom: 20px;
    }
    label { display: block; font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
    select {
      width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--input-border);
      border-radius: 5px; background-color: var(--input-bg); box-sizing: border-box; color: var(--text-color);
    }
    button {
      background: #0056b3; color: white; border: none; padding: 12px 20px;
      font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%;
    }
    button:active { background: #004494; }
    #generate-btn { margin-top: 25px; padding: 15px; font-size: 18px; }
    
    /* 設定項目内の区切り線 */
    .squad-config-group {
      margin-top: 15px; padding-bottom: 15px; border-bottom: 1px dashed var(--input-border);
    }
    .squad-config-group:last-child { border-bottom: none; padding-bottom: 0; }
    
    #squad-configs { margin-top: 15px; padding-left: 10px; border-left: 3px solid #0056b3; }
    
    /* ★ トグルスイッチのCSS設定 ★ */
    .switch-container {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 20px; margin-bottom: 5px; font-weight: bold;
      padding: 10px 0; border-top: 1px solid var(--input-border); border-bottom: 1px solid var(--input-border);
    }
    .switch {
      position: relative; display: inline-block; width: 50px; height: 28px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; transition: .4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #4CAF50; }
    input:checked + .slider:before { transform: translateX(22px); }
    
    /* 個別秒数設定の表示制御用クラス */
    .squad-time-container { display: none; margin-top: 10px; }
    
    #timer-section {
      height: 100%; display: none; flex-direction: column;
      box-sizing: border-box; overflow: hidden;
    }

    #global-timer-container {
      background-color: var(--card-bg); margin: 10px 10px 0 10px; padding: 12px;
      border-radius: 8px; box-shadow: 0 2px 4px var(--card-shadow); text-align: center;
      font-size: 22px; font-weight: bold; border-left: 5px solid #0056b3; flex-shrink: 0;
    }

    #squads-wrapper {
      flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px;
      overflow: hidden;
    }
    
    .squad-container {
      flex: 1; display: flex; flex-direction: column;
      background-color: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 4px var(--card-shadow);
      border-left: 5px solid #4CAF50; overflow: hidden; min-height: 0;
    }
    
    .squad-title {
      font-weight: bold; font-size: 18px; padding: 10px 15px; 
      background-color: var(--squad-title-bg); flex-shrink: 0; z-index: 10;
    }
    
    .squad-scroll-area {
      flex: 1; overflow-y: auto; padding: 10px; scroll-behavior: smooth;
    }
    
    .timer-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; height: max-content; 
    }
    
    .timer {
      position: relative; display: flex; align-items: center; justify-content: center;
      background-color: var(--timer-bg); border-radius: 5px; cursor: pointer; user-select: none;
      box-shadow: 0 2px 2px rgba(0,0,0,0.1); overflow: hidden; width: 100%;
      aspect-ratio: 1 / 1; box-sizing: border-box; border: 1px solid transparent; 
    }
    
    .timer::before {
      content: attr(data-num); position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: min(13vw, 55px); line-height: 1; font-weight: 900; 
      color: var(--timer-watermark); z-index: 1;
    }
    
    .timer span {
      position: relative; z-index: 2; font-size: 18px; font-weight: bold;
      text-shadow: var(--timer-text-shadow);
    }
    
    .timer.running { 
      background-color: var(--timer-running-bg); border: 1px solid var(--timer-running-border); color: var(--timer-running-text); 
    }
    
    .timer.flashing { 
      animation: blink 0.5s infinite alternate; background-color: #f44336; color: white; border-color: #f44336; 
    }
    .timer.finished { 
      background-color: #d32f2f; color: white; border-color: #d32f2f; 
    }
    .timer.finished span, .timer.flashing span {
      text-shadow: 0px 0px 4px rgba(0, 0, 0, 0.6);
    }
    .timer.finished::before { color: rgba(255,255,255,0.4); } 
    
    @keyframes blink {
      from { background-color: #f44336; }
      to { background-color: #ffcdd2; color: #d32f2f; }
    }
    
    #reset-btn-container { 
      padding: 10px; background-color: var(--btn-reset-container-bg); 
      border-top: 1px solid var(--btn-reset-border); flex-shrink: 0; 
    }
    #reset-btn { background: #555; padding: 12px; }
  </style>
</head>
<body>

  <div id="setup-section">
    <h1>💣 弾着タイマー設定</h1>
    <div class="card">
      
      <div id="default-time-container">
        <label>一括セットする秒数</label>
        <select id="default-time"></select>
      </div>

      <div class="switch-container">
        <span>分隊ごとに秒数を個別設定</span>
        <label class="switch">
          <input type="checkbox" id="per-squad-time-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <label>分隊の数（1〜5）</label>
      <select id="squad-count"></select>

      <div id="squad-configs"></div>

      <button id="generate-btn" onclick="generateApp()">タイマー画面へ</button>
    </div>
  </div>

  <div id="timer-section">
    <div id="global-timer-container">
      ⏱️ 経過時間 <span id="global-timer-display">00:00</span>
    </div>
    
    <div id="squads-wrapper"></div>
    
    <div id="reset-btn-container">
      <button id="reset-btn" onclick="resetApp()">設定に戻る</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    let globalStartTime = null;
    let globalInterval = null;

    function populateSelect(selectId, min, max, defaultVal, suffix = "") {
      const select = document.getElementById(selectId);
      if (!select) return;
      select.innerHTML = '';
      for (let i = min; i <= max; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i + suffix;
        if (i === defaultVal) opt.selected = true;
        select.appendChild(opt);
      }
    }

    populateSelect('default-time', 5, 120, 30, " 秒");
    populateSelect('squad-count', 1, 5, 3, " 個分隊");

    const squadCountSelect = document.getElementById('squad-count');
    const squadConfigsDiv = document.getElementById('squad-configs');
    const toggleSwitch = document.getElementById('per-squad-time-toggle');

    squadCountSelect.addEventListener('change', updateSquadConfigs);
    
    // トグルが切り替わったときの処理（表示/非表示を切り替え）
    toggleSwitch.addEventListener('change', (e) => {
      const isChecked = e.target.checked;
      document.getElementById('default-time-container').style.display = isChecked ? 'none' : 'block';
      const timeContainers = document.querySelectorAll('.squad-time-container');
      timeContainers.forEach(container => {
        container.style.display = isChecked ? 'block' : 'none';
      });
    });

    function updateSquadConfigs() {
      const count = parseInt(squadCountSelect.value);
      const defaultTimeVal = parseInt(document.getElementById('default-time').value) || 30;
      const isChecked = toggleSwitch.checked;

      squadConfigsDiv.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        squadConfigsDiv.innerHTML += `
          <div class="squad-config-group">
            <label>第${i}分隊の弾数</label>
            <select id="ammo-squad-${i}"></select>
            
            <div class="squad-time-container" id="time-container-squad-${i}" style="display: ${isChecked ? 'block' : 'none'};">
              <label style="color: #4CAF50;">第${i}分隊の秒数</label>
              <select id="time-squad-${i}"></select>
            </div>
          </div>
        `;
      }
      for (let i = 1; i <= count; i++) {
        populateSelect(`ammo-squad-${i}`, 1, 50, 10, " 発");
        populateSelect(`time-squad-${i}`, 5, 120, defaultTimeVal, " 秒");
      }
    }
    updateSquadConfigs();

    function generateApp() {
      clearInterval(globalInterval);
      globalStartTime = null;
      document.getElementById('global-timer-display').textContent = '00:00';

      const isPerSquadTime = toggleSwitch.checked;
      const globalDefaultTime = parseInt(document.getElementById('default-time').value);
      const squadCount = parseInt(squadCountSelect.value);
      const wrapper = document.getElementById('squads-wrapper');
      wrapper.innerHTML = '';

      for (let i = 1; i <= squadCount; i++) {
        const ammoCount = parseInt(document.getElementById(`ammo-squad-${i}`).value);
        // ★ トグルがONなら個別設定の秒数を、OFFなら一括設定の秒数を読み込む
        const squadTime = isPerSquadTime 
            ? parseInt(document.getElementById(`time-squad-${i}`).value) 
            : globalDefaultTime;
        
        const squadDiv = document.createElement('div');
        squadDiv.className = 'squad-container';
        squadDiv.innerHTML = `<div class="squad-title">第${i}分隊 (${squadTime}秒)</div>`; // タイトルに秒数も表示してわかりやすく
        
        const scrollArea = document.createElement('div');
        scrollArea.className = 'squad-scroll-area';
        
        const gridDiv = document.createElement('div');
        gridDiv.className = 'timer-grid';

        for (let j = 1; j <= ammoCount; j++) {
          const timerObj = createTimerElement(squadTime, j); // 各分隊用の秒数を渡す
          gridDiv.appendChild(timerObj);
        }
        
        scrollArea.appendChild(gridDiv);
        squadDiv.appendChild(scrollArea);
        wrapper.appendChild(squadDiv);
      }

      document.getElementById('setup-section').style.display = 'none';
      document.getElementById('timer-section').style.display = 'flex';
    }

    function createTimerElement(duration, ammoNumber) {
      const div = document.createElement('div');
      div.className = 'timer';
      div.setAttribute('data-num', ammoNumber);
      
      const timeSpan = document.createElement('span');
      timeSpan.textContent = duration.toFixed(1);
      div.appendChild(timeSpan);

      let state = 'idle'; 
      let interval;
      let lastTap = 0;

      div.addEventListener('click', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        lastTap = currentTime;

        if (tapLength < 300 && tapLength > 0) {
          clearInterval(interval);
          state = 'idle';
          div.className = 'timer';
          timeSpan.textContent = duration.toFixed(1);
          return;
        }

        if (state === 'idle') {
          state = 'running';
          div.classList.add('running');
          const endTime = Date.now() + duration * 1000;

          if (globalStartTime === null) {
            globalStartTime = Date.now();
            globalInterval = setInterval(() => {
              const elapsedMs = Date.now() - globalStartTime;
              const totalSeconds = Math.floor(elapsedMs / 1000);
              const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
              const seconds = String(totalSeconds % 60).padStart(2, '0');
              document.getElementById('global-timer-display').textContent = `${minutes}:${seconds}`;
            }, 200);
          }

          interval = setInterval(() => {
            const remaining = (endTime - Date.now()) / 1000;
            
            if (remaining <= 0) {
              clearInterval(interval);
              timeSpan.textContent = '0.0';
              div.className = 'timer finished';
              state = 'finished';
              
              const siblings = Array.from(div.parentElement.children);
              const nextActive = siblings.find(t => !t.classList.contains('finished'));
              if (nextActive) {
                nextActive.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }

            } else {
              timeSpan.textContent = remaining.toFixed(1);
              if (remaining <= 5.0 && !div.classList.contains('flashing')) {
                div.classList.remove('running');
                div.classList.add('flashing');
              }
            }
          }, 100);
        }
      });

      return div;
    }

    function resetApp() {
      clearInterval(globalInterval);
      globalStartTime = null;
      document.getElementById('global-timer-display').textContent = '00:00';

      document.getElementById('setup-section').style.display = 'block';
      document.getElementById('timer-section').style.display = 'none';
    }
  </script>
</body>
</html>
