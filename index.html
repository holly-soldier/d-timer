<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>弾着タイマー</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    /* 🎨 ライトモード・ダークモードのカラー定義（一括管理） */
    :root {
      --bg-color: #f4f4f9;
      --text-color: #333;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.1);
      --squad-title-bg: #eee;
      --timer-bg: #e0e0e0;
      --timer-watermark: rgba(0,0,0,0.15);
      --timer-text-shadow: 0px 0px 4px rgba(255, 255, 255, 0.9), 0px 0px 4px rgba(255, 255, 255, 0.9);
      --input-bg: #f9f9f9;
      --input-border: #ccc;
      --btn-reset-container-bg: #fff;
      --btn-reset-border: #ccc;
      --timer-running-bg: #fff9c4;
      --timer-running-border: #fbc02d;
      --timer-running-text: #333;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --card-bg: #1e1e1e;
        --card-shadow: rgba(0,0,0,0.5);
        --squad-title-bg: #2c2c2c;
        --timer-bg: #333;
        --timer-watermark: rgba(255,255,255,0.15);
        /* ダークモードは白光りをやめ、黒い影でクッキリさせる */
        --timer-text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        --input-bg: #2c2c2c;
        --input-border: #555;
        --btn-reset-container-bg: #121212;
        --btn-reset-border: #333;
        --timer-running-bg: #5c5311;
        --timer-running-border: #fbc02d;
        --timer-running-text: #fff;
      }
    }

    /* 📱 全体の設定（スクロールを完全に禁止し1画面に固定） */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      height: 100vh; width: 100vw;
      display: flex; flex-direction: column;
      touch-action: manipulation;
      overflow: hidden;
    }
    
    /* 設定画面 */
    #setup-section {
      height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box;
    }
    h1 { font-size: 24px; text-align: center; margin-top: 0; }
    .card {
      background-color: var(--card-bg); padding: 20px; border-radius: 10px;
      box-shadow: 0 4px 6px var(--card-shadow); margin-bottom: 20px;
    }
    label { display: block; font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
    select {
      width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--input-border);
      border-radius: 5px; background-color: var(--input-bg); box-sizing: border-box; color: var(--text-color);
    }
    button {
      background: #0056b3; color: white; border: none; padding: 12px 20px;
      font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%;
    }
    button:active { background: #004494; }
    #generate-btn { margin-top: 25px; padding: 15px; font-size: 18px; }
    #squad-configs { margin-top: 15px; padding-left: 10px; border-left: 3px solid #0056b3; }
    
    /* タイマー画面（1画面に収める） */
    #timer-section {
      height: 100%; display: none; flex-direction: column;
      box-sizing: border-box; overflow: hidden;
    }
    #squads-wrapper {
      flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px;
      overflow: hidden;
    }
    
    /* 各分隊の枠 */
    .squad-container {
      flex: 1; display: flex; flex-direction: column;
      background-color: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 4px var(--card-shadow);
      border-left: 5px solid #4CAF50; overflow: hidden; min-height: 0;
    }
    
    /* 🔠 分隊タイトル（フォントサイズを大きく調整） */
    .squad-title {
      font-weight: bold; 
      font-size: 18px; /* 14pxから拡大 */
      padding: 10px 15px; 
      background-color: var(--squad-title-bg);
      flex-shrink: 0; z-index: 10;
    }
    
    /* ★ 各分隊の中だけでスクロール ★ */
    .timer-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); 
      gap: 10px; padding: 10px;
      overflow-y: auto; flex: 1; scroll-behavior: smooth;
      align-content: start; /* 縦伸びを防ぐ最重要プロパティ */
    }
    
    /* 🟩 タイマーボタンの形状（絶対に正方形を維持する設定） */
    .timer {
      position: relative; display: flex; align-items: center; justify-content: center;
      background-color: var(--timer-bg); border-radius: 5px; cursor: pointer; user-select: none;
      box-shadow: 0 2px 2px rgba(0,0,0,0.1); overflow: hidden;
      width: 100%;          /* 横幅をグリッドに合わせる */
      aspect-ratio: 1 / 1;  /* 高さを横幅と全く同じにする */
      box-sizing: border-box;
      border: 1px solid transparent; /* 動作時の枠線ズレ防止 */
    }
    .timer::before {
      content: attr(data-num); position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; font-weight: 900; 
      color: var(--timer-watermark); z-index: 1;
    }
    
    .timer span {
      position: relative; z-index: 2; font-size: 18px; font-weight: bold;
      text-shadow: var(--timer-text-shadow);
    }
    
    /* タイマー作動中の状態 */
    .timer.running { 
      background-color: var(--timer-running-bg); 
      border: 1px solid var(--timer-running-border); 
      color: var(--timer-running-text); 
    }
    
    /* 終了・点滅時の状態（色を固定） */
    .timer.flashing { 
      animation: blink 0.5s infinite alternate; 
      background-color: #f44336; color: white; border-color: #f44336; 
    }
    .timer.finished { 
      background-color: #d32f2f; color: white; border-color: #d32f2f; 
    }
    .timer.finished span, .timer.flashing span {
      text-shadow: 0px 0px 4px rgba(0, 0, 0, 0.6);
    }
    .timer.finished::before { color: rgba(255,255,255,0.3); }
    
    @keyframes blink {
      from { background-color: #f44336; }
      to { background-color: #ffcdd2; color: #d32f2f; }
    }
    
    #reset-btn-container { 
      padding: 10px; background-color: var(--btn-reset-container-bg); 
      border-top: 1px solid var(--btn-reset-border); flex-shrink: 0; 
    }
    #reset-btn { background: #555; padding: 12px; }
  </style>
</head>
<body>

  <div id="setup-section">
    <h1>💣 弾着タイマー設定</h1>
    <div class="card">
      <label>一括セットする秒数</label>
      <select id="default-time"></select>

      <label>分隊の数（1〜5）</label>
      <select id="squad-count"></select>

      <div id="squad-configs"></div>

      <button id="generate-btn" onclick="generateApp()">タイマー画面へ</button>
    </div>
  </div>

  <div id="timer-section">
    <div id="squads-wrapper"></div>
    <div id="reset-btn-container">
      <button id="reset-btn" onclick="resetApp()">設定に戻る</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    function populateSelect(selectId, min, max, defaultVal, suffix = "") {
      const select = document.getElementById(selectId);
      select.innerHTML = '';
      for (let i = min; i <= max; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i + suffix;
        if (i === defaultVal) opt.selected = true;
        select.appendChild(opt);
      }
    }

    populateSelect('default-time', 5, 120, 30, " 秒");
    populateSelect('squad-count', 1, 5, 3, " 個分隊");

    const squadCountSelect = document.getElementById('squad-count');
    const squadConfigsDiv = document.getElementById('squad-configs');

    squadCountSelect.addEventListener('change', updateSquadConfigs);
    
    function updateSquadConfigs() {
      const count = parseInt(squadCountSelect.value);
      squadConfigsDiv.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        squadConfigsDiv.innerHTML += `
          <label>第${i}分隊の弾数</label>
          <select id="ammo-squad-${i}"></select>
        `;
      }
      for (let i = 1; i <= count; i++) {
        populateSelect(`ammo-squad-${i}`, 1, 50, 10, " 発");
      }
    }
    updateSquadConfigs();

    function generateApp() {
      const defaultTime = parseInt(document.getElementById('default-time').value);
      const squadCount = parseInt(squadCountSelect.value);
      const wrapper = document.getElementById('squads-wrapper');
      wrapper.innerHTML = '';

      for (let i = 1; i <= squadCount; i++) {
        const ammoCount = parseInt(document.getElementById(`ammo-squad-${i}`).value);
        
        const squadDiv = document.createElement('div');
        squadDiv.className = 'squad-container';
        squadDiv.innerHTML = `<div class="squad-title">第${i}分隊</div>`;
        
        const gridDiv = document.createElement('div');
        gridDiv.className = 'timer-grid';

        for (let j = 1; j <= ammoCount; j++) {
          const timerObj = createTimerElement(defaultTime, j);
          gridDiv.appendChild(timerObj);
        }
        
        squadDiv.appendChild(gridDiv);
        wrapper.appendChild(squadDiv);
      }

      document.getElementById('setup-section').style.display = 'none';
      document.getElementById('timer-section').style.display = 'flex';
    }

    function createTimerElement(duration, ammoNumber) {
      const div = document.createElement('div');
      div.className = 'timer';
      div.setAttribute('data-num', ammoNumber);
      
      const timeSpan = document.createElement('span');
      timeSpan.textContent = duration.toFixed(1);
      div.appendChild(timeSpan);

      let state = 'idle'; 
      let interval;
      let lastTap = 0;

      div.addEventListener('click', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        lastTap = currentTime;

        if (tapLength < 300 && tapLength > 0) {
          clearInterval(interval);
          state = 'idle';
          div.className = 'timer';
          timeSpan.textContent = duration.toFixed(1);
          return;
        }

        if (state === 'idle') {
          state = 'running';
          div.classList.add('running');
          const endTime = Date.now() + duration * 1000;

          interval = setInterval(() => {
            const remaining = (endTime - Date.now()) / 1000;
            
            if (remaining <= 0) {
              clearInterval(interval);
              timeSpan.textContent = '0.0';
              div.className = 'timer finished';
              state = 'finished';
              
              const siblings = Array.from(div.parentElement.children);
              const nextActive = siblings.find(t => !t.classList.contains('finished'));
              if (nextActive) {
                nextActive.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }

            } else {
              timeSpan.textContent = remaining.toFixed(1);
              if (remaining <= 5.0 && !div.classList.contains('flashing')) {
                div.classList.remove('running');
                div.classList.add('flashing');
              }
            }
          }, 100);
        }
      });

      return div;
    }

    function resetApp() {
      document.getElementById('setup-section').style.display = 'block';
      document.getElementById('timer-section').style.display = 'none';
    }
  </script>
</body>
</html>
